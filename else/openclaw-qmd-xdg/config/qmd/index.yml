global_context: OpenClaw memory retrieval index
collections:
  memory-root:
    path: C:/Users/lhr/.openclaw/workspace
    pattern: MEMORY.md
    context:
      /: Primary memory file for OpenClaw.
  indexed-memory:
    path: C:/Users/lhr/.openclaw/workspace/memory/indexed
    pattern: "**/*.md"
    context:
      /: Structured durable memory shards for OpenClaw.
embedding:
  provider: openai-compatible
  model: Qwen/Qwen3-Embedding-0.6B
  api_key: ${SILICONFLOW_API_KEY}
  base_url: https://api.siliconflow.cn/v1
  timeout_ms: 30000
  dimensions: 1024
rerank:
  provider: openai-compatible
  endpoint: rerank
  model: Qwen/Qwen3-Reranker-0.6B
  api_key: ${SILICONFLOW_API_KEY}
  base_url: https://api.siliconflow.cn/v1
  timeout_ms: 30000
  max_documents: 40
query_expansion:
  provider: openai-compatible
  model: Qwen/Qwen2.5-7B-Instruct
  api_key: ${SILICONFLOW_API_KEY}
  base_url: https://api.siliconflow.cn/v1
  timeout_ms: 30000
  temperature: 0.2
  max_tokens: 400
